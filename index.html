<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>论语每日一句</title>

<style>
body {font-family: Arial; text-align:center; padding:30px; background:#f5f5f5;}
.card {background:white; padding:20px; border-radius:12px;}
button {margin:10px; padding:10px 20px;}
</style>

</head>

<body>

<h2>📜 论语每日一句</h2>

<div class="card">
<p id="text"></p>
<p id="exp"></p>
<p>👍 点赞数：<span id="likes">0</span></p>
</div>

<button onclick="like()">👍 点赞</button>
<button onclick="next()">换一句</button>

<p id="top"></p>

<script>

const data = [
["学而时习之，不亦说乎？","学习并复习，是快乐的"],
["己所不欲，勿施于人","不要把不想要的给别人"],
["三人行，必有我师焉","任何人都值得学习"],
["知之为知之，不知为不知","知道就是知道"],
["学而不思则罔，思而不学则殆","学与思要结合"]
];

let index = new Date().getDate() % data.length;
let likes = JSON.parse(localStorage.getItem("likes") || "{}");

function load(){
  document.getElementById("text").innerText = data[index][0];
  document.getElementById("exp").innerText = data[index][1];

  let key = "like_" + index;
  document.getElementById("likes").innerText = likes[key] || 0;

  showTop();
}

function like(){
  let key = "like_" + index;
  likes[key] = (likes[key] || 0) + 1;
  localStorage.setItem("likes", JSON.stringify(likes));
  load();
}

function next(){
  index = Math.floor(Math.random()*data.length);
  load();
}

function showTop(){
  let arr = [];

  for(let i=0;i<data.length;i++){
    let key = "like_" + i;
    arr.push({i:i, v:likes[key]||0});
  }

  arr.sort((a,b)=>b.v-a.v);

  let top = arr[0];

  document.getElementById("top").innerText =
    "🔥最受欢迎：" + data[top.i][0] + "（👍"+top.v+"）";
}

load();

</script>

</body>
</html>
