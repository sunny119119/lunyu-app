<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>论语每日一句</title>
<style>
body {font-family: Arial; text-align:center; padding:40px;}
.card {background:#f2f2f2; padding:20px; border-radius:12px;}
button {margin-top:20px; padding:10px 20px;}
</style>
</head>
<body>

<h2>📜 论语每日一句</h2>

<div class="card">
<p id="text">学而时习之，不亦说乎？</p>
<p id="exp">学习并复习，是快乐的</p>
</div>

<button onclick="next()">换一句</button>

<script>
const data = [
["学而时习之，不亦说乎？","学习并复习，是快乐的"],
["己所不欲，勿施于人","不要把不想要的给别人"],
["三人行，必有我师焉","任何人都值得学习"],
["知之为知之，不知为不知","知道就是知道"],
["学而不思则罔，思而不学则殆","学与思要结合"]
];

function next(){
let i = Math.floor(Math.random()*data.length);
document.getElementById("text").innerText=data[i][0];
document.getElementById("exp").innerText=data[i][1];
}
</script>

</body>
</html>
