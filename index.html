<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>论语每日一句</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 30px;
  background: #f5f5f5;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin: 20px 0;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
}

input {
  padding: 8px;
  margin-top: 10px;
}
</style>

</head>

<body>

<h2>📜 论语每日一句</h2>

<input id="username" placeholder="输入你的名字">
<p id="welcome"></p>

<div class="card">
  <p id="text"></p>
  <p id="exp"></p>
  <p>👍 点赞数：<span id="likes">0</span></p>
</div>

<button onclick="like()">👍 点赞</button>
<button onclick="next()">换一句</button>

<p id="top"></p>

<p id="userRank"></p>

<p>🏆 点赞最多的经典，将成为“今日榜首”</p>

<script>

// ===== 用户系统 =====
let user = localStorage.getItem("user") || "";

if(!user){
  user = prompt("请输入你的名字");
  localStorage.setItem("user", user);
}

document.getElementById("username").value = user;
document.getElementById("welcome").innerText = "欢迎：" + user;

// ===== 数据 =====
const data = [
["学而时习之，不亦说乎？","学习并复习，是快乐的"],
["己所不欲，勿施于人","不要把不想要的给别人"],
["三人行，必有我师焉","任何人都值得学习"],
["知之为知之，不知为不知","知道就是知道"],
["学而不思则罔，思而不学则殆","学与思要结合"]
];

// 今日一句
let index = new Date().getDate() % data.length;

// 点赞数据
let likes = JSON.parse(localStorage.getItem("likes") || "{}");

// 用户数据
let users = JSON.parse(localStorage.getItem("users") || "{}");

// ===== 页面加载 =====
function load(){
  document.getElementById("text").innerText = data[index][0];
  document.getElementById("exp").innerText = data[index][1];

  let key = "like_" + index;
  document.getElementById("likes").innerText = likes[key] || 0;

  showTop();
  showUserRank();
}

// ===== 点赞 =====
function like(){
  let key = "like_" + index;
  likes[key] = (likes[key] || 0) + 1;

  // 用户累计点赞
  users[user] = (users[user] || 0) + 1;

  localStorage.setItem("likes", JSON.stringify(likes));
  localStorage.setItem("users", JSON.stringify(users));

  load();
}

// ===== 换一句 =====
function next(){
  index = Math.floor(Math.random()*data.length);
  load();
}

// ===== 内容排行榜 =====
function showTop(){
  let arr = [];

  for(let i=0;i<data.length;i++){
    let key = "like_" + i;
    arr.push({i:i, v:likes[key]||0});
  }

  arr.sort((a,b)=>b.v-a.v);

  let top = arr[0];

  document.getElementById("top").innerText =
    "🔥最受欢迎：" + data[top.i][0] + "（👍"+top.v+"）";
}

// ===== 用户排行榜 =====
function showUserRank(){
  let arr = [];

  for(let name in users){
    arr.push({name:name, v:users[name]});
  }

  arr.sort((a,b)=>b.v-a.v);

  let text = "🏆 用户排行榜：<br>";

  for(let i=0;i<Math.min(3, arr.length);i++){
    text += (i+1) + ". " + arr[i].name + "（👍"+arr[i].v+"）<br>";
  }

  document.getElementById("userRank").innerHTML = text;
}

load();

</script>

</body>
</html>
